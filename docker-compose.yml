version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eastleigh_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: eastleigh_academy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eastleigh_network

  backend:
    build: ./backend
    container_name: eastleigh_backend
    environment:
      - FLASK_ENV=production
      - DOCKER_ENV=true
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/eastleigh_academy
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - eastleigh_network
    command: >
      sh -c "python init_db.py &&
             gunicorn --bind 0.0.0.0:5000 --workers 4 --threads 2 --reload app:app"

  frontend:
    build: ./frontend
    container_name: eastleigh_frontend
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL}
      - REACT_APP_ADMIN_USERNAME=${REACT_APP_ADMIN_USERNAME}
      - REACT_APP_ADMIN_PASSWORD=${REACT_APP_ADMIN_PASSWORD}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - eastleigh_network

  adminer:
    image: adminer
    container_name: eastleigh_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - eastleigh_network

volumes:
  postgres_data:

networks:
  eastleigh_network:
    driver: bridge